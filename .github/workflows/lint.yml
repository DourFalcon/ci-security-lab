name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD~1
          head: HEAD
          extra_args: --only-verified
      - name: Run lint
        run: echo "Linting code..." && ls -la
      - name: Use secret safely
        run: echo "Secret is available but masked in logs"
        env:
          MY_SECRET: ${{ secrets.TEST_API_KEY }}
